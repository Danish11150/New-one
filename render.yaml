services:
  - type: web
    name: company-neo-vision
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: BLOGGER_API_KEY
        sync: false
      - key: BLOGGER_ACCESS_TOKEN
        sync: false
      - key: BLOG_ID
        sync: false
